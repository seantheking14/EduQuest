    <main class="main-content">
        <div class="game-container">

            <!-- Start Screen -->
            <div class="screen" id="startScreen">
                <div class="start-card">
                    <h1 class="game-logo">🔤 Word Scramble</h1>
                    <p class="game-tagline">Unscramble the letters to form real words!</p>

                    <div class="difficulty-pick">
                        <button class="diff-btn active" data-diff="easy">Easy</button>
                        <button class="diff-btn" data-diff="medium">Medium</button>
                        <button class="diff-btn" data-diff="hard">Hard</button>
                    </div>

                    <div class="category-pick">
                        <button class="cat-btn active" data-cat="english">📖 English</button>
                        <button class="cat-btn" data-cat="math">🔢 Math</button>
                        <button class="cat-btn" data-cat="selfcare">🌿 Self Care</button>
                    </div>

                    <button class="btn-play" id="btnPlay">Play</button>

                    <div class="high-score-row">
                        <span>🏆 Best: <strong id="bestScore">0</strong></span>
                    </div>
                    <div id="wsHistoryBox" class="ws-history-box hidden"></div>
                </div>
            </div>

            <!-- Game Screen -->
            <div class="screen hidden" id="gameScreen">
                <!-- HUD -->
                <div class="hud">
                    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-val" id="hudScore">0</span></div>
                    <div class="hud-item"><span class="hud-label">Round</span><span class="hud-val" id="hudRound">1/10</span></div>
                    <div class="hud-item hud-timer"><span class="hud-label">Time</span><span class="hud-val" id="hudTimer">30</span></div>
                    <div class="hud-item"><span class="hud-label">Streak</span><span class="hud-val" id="hudStreak">0🔥</span></div>
                </div>

                <!-- Hint -->
                <p class="hint-text" id="hintText"></p>

                <!-- Scrambled Letters -->
                <div class="letter-rack" id="letterRack"></div>

                <!-- Answer Slots -->
                <div class="answer-rack" id="answerRack"></div>

                <!-- Controls -->
                <div class="game-controls">
                    <button class="ctrl-btn" id="btnClear">Clear</button>
                    <button class="ctrl-btn" id="btnHint">💡 Hint</button>
                    <button class="ctrl-btn btn-submit" id="btnSubmit">Submit</button>
                </div>

                <!-- Feedback toast -->
                <div class="feedback hidden" id="feedback"></div>
            </div>

            <!-- Results Screen -->
            <div class="screen hidden" id="resultsScreen">
                <div class="results-card">
                    <span class="results-emoji" id="resEmoji">🎉</span>
                    <h2 id="resTitle">Great Job!</h2>
                    <div class="results-score" id="resScore">0</div>
                    <p class="results-detail" id="resDetail">0/10 correct</p>
                    <p class="results-xp" id="resXp">+0 XP</p>
                    <div class="results-actions">
                        <button class="ctrl-btn" id="btnPlayAgain">Play Again</button>
                        <button class="ctrl-btn" onclick="window.location.href='../dashboard/dashboard.html'">Dashboard</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
