<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduQuest</title>
    <link rel="stylesheet" href="../shared/styles/reset.css">
    <link rel="stylesheet" href="../shared/styles/variables.css">
    <link rel="stylesheet" href="../shared/styles/responsive.css">
    <link rel="stylesheet" href="./login/login.css">
    <style>
        .password-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .password-card {
            max-width: 500px;
            background: white;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .password-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .password-header h1 {
            font-size: 1.8rem;
            margin: 0 0 var(--spacing-sm) 0;
        }

        .password-content {
            padding: var(--spacing-xl);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 600;
            color: var(--color-dark);
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-message {
            margin: var(--spacing-lg) 0;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            display: none;
        }

        .form-message.error {
            background: #fee;
            color: var(--color-error);
            border: 1px solid #fcc;
        }

        .form-message.success {
            background: #efe;
            color: var(--color-success);
            border: 1px solid #cfc;
        }

        .form-message.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .info-text {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-lg);
            line-height: 1.6;
        }

        .back-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }

        .back-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-card">
            <div class="password-header">
                <h1>Forgot Password?</h1>
                <p>We'll help you reset it</p>
            </div>

            <div class="password-content">
                <div class="info-text">
                    Enter the email address associated with your account and we'll send you a 6-digit code to reset your password.
                </div>

                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-message error" id="errorMessage"></div>
                    <div class="form-message success" id="successMessage"></div>

                    <button type="submit" class="btn btn-primary" id="submitButton">
                        Send OTP
                    </button>
                </form>

                <div class="back-link">
                    <a href="login/login.html">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ForgotPasswordForm {
            constructor() {
                this.init();
            }

            init() {
                document.getElementById('forgotPasswordForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.submitForm();
                });
            }

            async submitForm() {
                const email = document.getElementById('email').value.trim();

                if (!email) {
                    this.showError('Email is required');
                    return;
                }

                if (!this.isValidEmail(email)) {
                    this.showError('Please enter a valid email address');
                    return;
                }

                const submitButton = document.getElementById('submitButton');
                const originalText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = 'Sending...';

                try {
                    const response = await fetch('../EDUQUEST/api/auth/forgot-password.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: email,
                        }),
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.showSuccess('OTP sent! Check your email for the 6-digit code.');
                        const email = document.getElementById('email').value;

                        // Redirect to reset password page after 2 seconds
                        setTimeout(() => {
                            window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
                        }, 2000);
                    } else {
                        this.showError(result.message || 'Failed to send reset link');
                        submitButton.disabled = false;
                        submitButton.textContent = originalText;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    this.showError(error.message || 'An error occurred. Please try again.');
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }

            isValidEmail(email) {
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return regex.test(email);
            }

            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                const successElement = document.getElementById('successMessage');

                errorElement.textContent = message;
                errorElement.classList.add('show');
                successElement.classList.remove('show');
            }

            showSuccess(message) {
                const successElement = document.getElementById('successMessage');
                const errorElement = document.getElementById('errorMessage');

                successElement.textContent = message;
                successElement.classList.add('show');
                errorElement.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ForgotPasswordForm();
        });
    </script>
</body>
</html>
