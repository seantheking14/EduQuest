<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduQuest</title>
    <link rel="stylesheet" href="../shared/styles/reset.css">
    <link rel="stylesheet" href="../shared/styles/variables.css">
    <link rel="stylesheet" href="../shared/styles/responsive.css">
    <link rel="stylesheet" href="./login/login.css">
    <style>
        .reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .reset-card {
            max-width: 500px;
            background: white;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .reset-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .reset-header h1 {
            font-size: 1.8rem;
            margin: 0 0 var(--spacing-sm) 0;
        }

        .reset-content {
            padding: var(--spacing-xl);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 600;
            color: var(--color-dark);
        }

        .form-group input {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .form-message {
            margin: var(--spacing-lg) 0;
            padding: var(--spacing-md);
            border-radius: var(--border-radius);
            display: none;
        }

        .form-message.error {
            background: #fee;
            color: var(--color-error);
            border: 1px solid #fcc;
        }

        .form-message.success {
            background: #efe;
            color: var(--color-success);
            border: 1px solid #cfc;
        }

        .form-message.show {
            display: block;
        }

        .error-message {
            font-size: 0.85rem;
            color: var(--color-error);
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .password-requirements {
            margin-top: var(--spacing-md);
            padding: var(--spacing-sm);
            background: #f5f5f5;
            border-radius: var(--border-radius);
            font-size: 0.85rem;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: 4px 0;
            color: var(--color-text-secondary);
        }

        .requirement.met {
            color: var(--color-success);
        }

        .requirement-icon {
            display: inline-block;
            width: 16px;
            text-align: center;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--color-border);
        }

        .back-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .btn-secondary-link {
            background: none;
            border: none;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0;
        }

        .btn-secondary-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <h1>Reset Password</h1>
                <p>Create a new password for your account</p>
            </div>

            <div class="reset-content">
                <!-- OTP Verification Step -->
                <div id="otpStep">
                    <h3 style="text-align: center; margin-bottom: var(--spacing-lg); color: var(--color-dark);">Enter Verification Code</h3>
                    <form id="otpForm">
                        <div class="form-group">
                            <label for="otp">6-Digit Code</label>
                            <input
                                type="text"
                                id="otp"
                                name="otp"
                                placeholder="000000"
                                maxlength="6"
                                inputmode="numeric"
                                required
                                autocomplete="off"
                            >
                            <span class="error-message" id="otpError"></span>
                            <p style="font-size: 0.9rem; color: var(--color-text-secondary); text-align: center; margin-top: var(--spacing-sm);">
                                We've sent a 6-digit code to your email. Enter it below.
                            </p>
                        </div>

                        <div class="form-message error" id="otpErrorMessage"></div>

                        <button type="submit" class="btn btn-primary" id="verifyOtpButton">
                            Verify Code
                        </button>
                    </form>
                </div>

                <!-- Password Reset Step (hidden initially) -->
                <div id="passwordStep" style="display: none;">
                    <form id="resetPasswordForm">
                        <input type="hidden" id="email" name="email">
                        <input type="hidden" id="token" name="token">

                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <div class="password-wrapper">
                                <input
                                    type="password"
                                    id="newPassword"
                                    name="newPassword"
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="toggle-password" data-field="newPassword">
                                    👁️
                                </button>
                            </div>
                            <span class="error-message" id="newPasswordError"></span>
                            <div class="password-requirements">
                                <div class="requirement" id="charRequirement">
                                    <span class="requirement-icon">○</span>
                                    At least 8 characters
                                </div>
                                <div class="requirement" id="upperRequirement">
                                    <span class="requirement-icon">○</span>
                                    One uppercase letter
                                </div>
                                <div class="requirement" id="numberRequirement">
                                    <span class="requirement-icon">○</span>
                                    One number
                                </div>
                                <div class="requirement" id="specialRequirement">
                                    <span class="requirement-icon">○</span>
                                    One special character
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="password-wrapper">
                                <input
                                    type="password"
                                    id="confirmPassword"
                                    name="confirmPassword"
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="toggle-password" data-field="confirmPassword">
                                    👁️
                                </button>
                            </div>
                            <span class="error-message" id="confirmPasswordError"></span>
                        </div>

                        <div class="form-message error" id="errorMessage"></div>
                        <div class="form-message success" id="successMessage"></div>

                        <button type="submit" class="btn btn-primary" id="submitButton">
                            Reset Password
                        </button>

                        <div style="text-align: center; margin-top: var(--spacing-md);">
                            <button type="button" class="btn-secondary-link" id="backToOtpButton" onclick="location.reload()">
                                ← Use different code
                            </button>
                        </div>
                    </form>
                </div>

                <div class="back-link">
                    <a href="login/login.html">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        class ResetPasswordForm {
            constructor() {
                this.email = '';
                this.otp = '';
                this.init();
            }

            init() {
                this.getEmailFromURL();
                this.setupOTPForm();
                this.setupPasswordForm();
            }

            getEmailFromURL() {
                const urlParams = new URLSearchParams(window.location.search);
                this.email = urlParams.get('email');

                if (!this.email) {
                    this.showOtpError('Missing email. Please request a password reset again.');
                    document.getElementById('otpForm').style.display = 'none';
                    return;
                }

                document.getElementById('email').value = this.email;
            }

            setupOTPForm() {
                document.getElementById('otpForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.submitOTP();
                });

                // Only allow digits in OTP field
                document.getElementById('otp').addEventListener('keydown', (e) => {
                    if (!/[0-9]/.test(e.key) && ![
                        'Backspace', 'Delete', 'Tab', 'Escape', 'Enter', 
                        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'
                    ].includes(e.key)) {
                        e.preventDefault();
                    }
                });
            }

            setupPasswordForm() {
                document.getElementById('resetPasswordForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.submitPasswordReset();
                });

                document.getElementById('newPassword').addEventListener('input', (e) => {
                    this.validatePassword(e.target.value);
                });

                // Toggle password visibility
                document.querySelectorAll('.toggle-password').forEach(button => {
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        const field = button.getAttribute('data-field');
                        this.togglePasswordVisibility(field);
                    });
                });
            }

            async submitOTP() {
                const otp = document.getElementById('otp').value.trim();

                if (!otp || otp.length !== 6) {
                    this.showOtpError('Please enter a valid 6-digit code');
                    return;
                }

                const button = document.getElementById('verifyOtpButton');
                const originalText = button.textContent;
                button.disabled = true;
                button.textContent = 'Verifying...';

                try {
                    const url = '../EDUQUEST/api/auth/reset-password.php';
                    const requestBody = {
                        email: this.email,
                        token: otp,
                        newPassword: '',  // Empty - only verifying OTP at this stage
                        confirmPassword: '',
                    };
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestBody),
                    });

                    let result = {};
                    const responseText = await response.text();
                    
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        console.error('JSON parse error:', parseError);
                        if (responseText.length === 0) {
                            this.showOtpError('Server returned empty response (status: ' + response.status + '). Please try again.');
                        } else {
                            this.showOtpError(`Server error: ${responseText.substring(0, 200)}`);
                        }
                        button.disabled = false;
                        button.textContent = originalText;
                        return;
                    }

                    if (response.status === 200 && result.success) {
                        // OTP is valid
                        this.otp = otp;
                        document.getElementById('token').value = otp;
                        this.showPasswordStep();
                    } else if (response.status === 401) {
                        // Token validation failed - invalid or expired OTP
                        this.showOtpError('Invalid or expired code. Please request a new password reset.');
                        button.disabled = false;
                        button.textContent = originalText;
                    } else {
                        // Unexpected response
                        this.showOtpError(result.message || 'Failed to verify code. Status: ' + response.status);
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    this.showOtpError(error.message || 'An error occurred. Please try again.');
                    button.disabled = false;
                    button.textContent = originalText;
                }
            }

            showPasswordStep() {
                document.getElementById('otpStep').style.display = 'none';
                document.getElementById('passwordStep').style.display = 'block';
                document.getElementById('newPassword').focus();
            }

            validatePassword(password) {
                const requirements = {
                    charRequirement: password.length >= 8,
                    upperRequirement: /[A-Z]/.test(password),
                    numberRequirement: /[0-9]/.test(password),
                    specialRequirement: /[!@#$%^&*()_\-+=\[\]{};:'"<>?\/\\|`~]/.test(password),
                };

                Object.entries(requirements).forEach(([id, isMet]) => {
                    const element = document.getElementById(id);
                    if (isMet) {
                        element.classList.add('met');
                        element.querySelector('.requirement-icon').textContent = '✓';
                    } else {
                        element.classList.remove('met');
                        element.querySelector('.requirement-icon').textContent = '○';
                    }
                });

                return Object.values(requirements).every(v => v === true);
            }

            validatePasswordMatch() {
                const password = document.getElementById('newPassword').value;
                const confirm = document.getElementById('confirmPassword').value;
                const error = document.getElementById('confirmPasswordError');

                if (confirm && password !== confirm) {
                    error.textContent = 'Passwords do not match';
                    error.classList.add('show');
                    return false;
                } else {
                    error.textContent = '';
                    error.classList.remove('show');
                    return true;
                }
            }

            togglePasswordVisibility(field) {
                const input = document.getElementById(field);
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
            }

            async submitPasswordReset() {
                const email = document.getElementById('email').value;
                const token = document.getElementById('token').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validate
                if (!this.validatePassword(newPassword)) {
                    this.showError('Password does not meet security requirements');
                    return;
                }

                if (!this.validatePasswordMatch()) {
                    this.showError('Passwords do not match');
                    return;
                }

                const submitButton = document.getElementById('submitButton');
                const originalText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = 'Resetting Password...';

                try {
                    const url = '../EDUQUEST/api/auth/reset-password.php';
                    const requestBody = {
                        email: email,
                        token: token,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword,
                    };
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestBody),
                    });

                    let result = {};
                    const responseText = await response.text();
                    
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        console.error('JSON parse error:', parseError);
                        if (responseText.length === 0) {
                            this.showError('Server returned empty response (status: ' + response.status + '). Please try again.');
                        } else {
                            this.showError(`Server error: ${responseText.substring(0, 200)}`);
                        }
                        submitButton.disabled = false;
                        submitButton.textContent = originalText;
                        return;
                    }

                    if (result.success && response.status === 200) {
                        this.showSuccess('Password reset successfully! Redirecting to login...');

                        // Redirect after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'login/login.html';
                        }, 2000);
                    } else {
                        this.showError(result.message || 'Failed to reset password (Status: ' + response.status + ')');
                        submitButton.disabled = false;
                        submitButton.textContent = originalText;
                    }
                } catch (error) {
                    console.error('Fetch error:', error);
                    this.showError(error.message || 'An error occurred. Please try again.');
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }

            showOtpError(message) {
                const errorElement = document.getElementById('otpErrorMessage');
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }

            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                const successElement = document.getElementById('successMessage');

                errorElement.textContent = message;
                errorElement.classList.add('show');
                successElement.classList.remove('show');
            }

            showSuccess(message) {
                const successElement = document.getElementById('successMessage');
                const errorElement = document.getElementById('errorMessage');

                successElement.textContent = message;
                successElement.classList.add('show');
                errorElement.classList.remove('show');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ResetPasswordForm();
        });
    </script>
</body>
</html>
