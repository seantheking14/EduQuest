<svg viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vinespark the Grass Adult Monkey">
  <defs>
    <radialGradient id="gadbody" cx="44%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#b87030"/>
      <stop offset="60%" stop-color="#7a4f1e"/>
      <stop offset="100%" stop-color="#4a2e0c"/>
    </radialGradient>
    <radialGradient id="gadhead" cx="44%" cy="33%" r="62%">
      <stop offset="0%" stop-color="#cc8c3c"/>
      <stop offset="100%" stop-color="#8a5a1a"/>
    </radialGradient>
    <radialGradient id="gadface" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eec88a"/>
      <stop offset="100%" stop-color="#cc9840"/>
    </radialGradient>
  </defs>
  <!-- ambient glow -->
  <ellipse cx="44" cy="104" rx="32" ry="7" fill="#27ae60" opacity="0.3"/>
  <!-- grand tail (long, curling) -->
  <path d="M14,82 Q0,70 -2,84 Q-4,98 10,100 Q18,101 18,88" fill="none" stroke="#7a4f1e" stroke-width="8" stroke-linecap="round"/>
  <!-- vine cape / armor (leafy shapes behind body) -->
  <path d="M18,68 Q10,52 18,44 Q26,38 30,52 Q22,56 18,68Z" fill="#27ae60" opacity="0.85"/>
  <path d="M68,68 Q76,52 68,44 Q60,38 56,52 Q64,56 68,68Z" fill="#27ae60" opacity="0.85"/>
  <path d="M14,82 Q6,72 10,64 Q16,58 20,70Z"  fill="#22c55e" opacity="0.75"/>
  <path d="M72,82 Q80,72 76,64 Q70,58 66,70Z"  fill="#22c55e" opacity="0.75"/>
  <!-- vine veins on cape -->
  <line x1="24" y1="44" x2="18" y2="68" stroke="#145a32" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <line x1="62" y1="44" x2="68" y2="68" stroke="#145a32" stroke-width="1.3" opacity="0.5" stroke-linecap="round"/>
  <!-- large body -->
  <ellipse cx="44" cy="78" rx="30" ry="24" fill="url(#gadbody)"/>
  <!-- belly -->
  <ellipse cx="44" cy="82" rx="20" ry="15" fill="#eec88a" opacity="0.55"/>
  <!-- vine bracelet decorations -->
  <ellipse cx="16" cy="80" rx="6" ry="4" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.9"/>
  <ellipse cx="72" cy="80" rx="6" ry="4" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.9"/>
  <!-- large ears -->
  <circle cx="20" cy="44" r="15" fill="url(#gadhead)"/>
  <circle cx="20" cy="44" r="10" fill="#eec88a"/>
  <circle cx="68" cy="44" r="15" fill="url(#gadhead)"/>
  <circle cx="68" cy="44" r="10" fill="#eec88a"/>
  <!-- large head -->
  <circle cx="44" cy="44" r="26" fill="url(#gadhead)"/>
  <!-- muzzle -->
  <ellipse cx="44" cy="56" rx="16" ry="11" fill="url(#gadface)"/>
  <!-- flower crown (3 flowers) -->
  <circle cx="34" cy="19" r="5.5" fill="#fbbf24"/>
  <circle cx="34" cy="19" r="2.8" fill="#f59e0b"/>
  <circle cx="44" cy="16" r="6.5" fill="#f472b6"/>
  <circle cx="44" cy="16" r="3.2" fill="#ec4899"/>
  <circle cx="54" cy="19" r="5.5" fill="#fbbf24"/>
  <circle cx="54" cy="19" r="2.8" fill="#f59e0b"/>
  <!-- flower petals -->
  <circle cx="29" cy="15" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="29" cy="23" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="39" cy="13" r="3.5" fill="#fbcfe8" opacity="0.8"/>
  <circle cx="49" cy="13" r="3.5" fill="#fbcfe8" opacity="0.8"/>
  <circle cx="59" cy="15" r="3" fill="#fde68a" opacity="0.8"/>
  <circle cx="59" cy="23" r="3" fill="#fde68a" opacity="0.8"/>
  <!-- vine stem on crown -->
  <path d="M28,25 Q36,22 44,22 Q52,22 60,25" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- powerful expressive eyes -->
  <circle cx="36" cy="40" r="8"   fill="white"/>
  <circle cx="36" cy="40" r="5.5" fill="#1a1a1a"/>
  <circle cx="38" cy="38" r="2"   fill="white"/>
  <circle cx="36" cy="40" r="8"   fill="none" stroke="#27ae60" stroke-width="1.5" opacity="0.6"/>
  <circle cx="52" cy="40" r="8"   fill="white"/>
  <circle cx="52" cy="40" r="5.5" fill="#1a1a1a"/>
  <circle cx="54" cy="38" r="2"   fill="white"/>
  <circle cx="52" cy="40" r="8"   fill="none" stroke="#27ae60" stroke-width="1.5" opacity="0.6"/>
  <!-- confident brow -->
  <path d="M28,31 Q36,26 44,31" fill="none" stroke="#5a3a10" stroke-width="2.5" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="44" cy="53" rx="3.5" ry="2.5" fill="#7a4f1e"/>
  <!-- confident smile -->
  <path d="M36,60 Q44,67 52,60" fill="none" stroke="#7a4f1e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- long powerful arms -->
  <ellipse cx="14" cy="82" rx="10" ry="6" fill="#966228" transform="rotate(-28 14 82)"/>
  <ellipse cx="74" cy="82" rx="10" ry="6" fill="#966228" transform="rotate(28 74 82)"/>
  <!-- powerful legs -->
  <ellipse cx="30" cy="100" rx="12" ry="7" fill="#7a4f1e"/>
  <ellipse cx="58" cy="100" rx="12" ry="7" fill="#7a4f1e"/>
  <!-- toe lines -->
  <line x1="23" y1="105" x2="21" y2="108" stroke="#4a2e0c" stroke-width="2"   stroke-linecap="round"/>
  <line x1="30" y1="106" x2="29" y2="109" stroke="#4a2e0c" stroke-width="2"   stroke-linecap="round"/>
  <line x1="53" y1="106" x2="51" y2="109" stroke="#4a2e0c" stroke-width="2"   stroke-linecap="round"/>
  <line x1="59" y1="107" x2="58" y2="110" stroke="#4a2e0c" stroke-width="2"   stroke-linecap="round"/>
  <!-- leaf sparkles -->
  <path d="M80,38 L81,34 L82,38 L78,36 L84,36Z" fill="#4ade80" opacity="0.75"/>
  <path d="M8,36  L9,32  L10,36 L6,34  L12,34Z"  fill="#4ade80" opacity="0.7"/>
</svg>
