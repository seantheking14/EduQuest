<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sprout the Grass Baby Monkey">
  <defs>
    <radialGradient id="gbbody" cx="44%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#cb8c40"/>
      <stop offset="100%" stop-color="#8b5e2a"/>
    </radialGradient>
    <radialGradient id="gbhead" cx="44%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4a04a"/>
      <stop offset="100%" stop-color="#a0722a"/>
    </radialGradient>
    <radialGradient id="gbface" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c080"/>
      <stop offset="100%" stop-color="#d4a04a"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="93" rx="22" ry="5" fill="#5a3a10" opacity="0.22"/>
  <!-- curling tail (behind body) -->
  <path d="M22,72 Q10,65 8,72 Q6,82 16,84 Q22,85 22,78" fill="none" stroke="#8b5e2a" stroke-width="5" stroke-linecap="round"/>
  <!-- body (small, round) -->
  <ellipse cx="40" cy="72" rx="22" ry="18" fill="url(#gbbody)"/>
  <!-- belly patch -->
  <ellipse cx="40" cy="74" rx="13" ry="10" fill="#e8c080" opacity="0.65"/>
  <!-- left big ear -->
  <circle cx="22" cy="52" r="11" fill="url(#gbhead)"/>
  <circle cx="22" cy="52" r="7"  fill="#e8c080"/>
  <!-- right big ear -->
  <circle cx="58" cy="52" r="11" fill="url(#gbhead)"/>
  <circle cx="58" cy="52" r="7"  fill="#e8c080"/>
  <!-- head (large round head — characteristic of monkeys) -->
  <circle cx="40" cy="52" r="20" fill="url(#gbhead)"/>
  <!-- face muzzle -->
  <ellipse cx="40" cy="61" rx="12" ry="8" fill="url(#gbface)"/>
  <!-- big cute eyes -->
  <circle cx="33" cy="50" r="6"   fill="white"/>
  <circle cx="33" cy="50" r="4"   fill="#1a1a1a"/>
  <circle cx="34.5" cy="48.5" r="1.5" fill="white"/>
  <circle cx="47" cy="50" r="6"   fill="white"/>
  <circle cx="47" cy="50" r="4"   fill="#1a1a1a"/>
  <circle cx="48.5" cy="48.5" r="1.5" fill="white"/>
  <!-- tiny cute nose -->
  <ellipse cx="40" cy="59" rx="2.5" ry="1.8" fill="#8b5e2a"/>
  <!-- happy smile -->
  <path d="M34,64 Q40,69 46,64" fill="none" stroke="#8b5e2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- tiny leaf on head -->
  <path d="M37,32 Q32,22 36,17 Q40,14 40,20 Q40,14 44,17 Q48,22 43,32 Q41,27 40,25 Q39,27 37,32Z" fill="#4ade80"/>
  <line x1="40" y1="32" x2="40" y2="18" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- short arms -->
  <ellipse cx="21" cy="74" rx="6" ry="4" fill="#a0722a" transform="rotate(-20 21 74)"/>
  <ellipse cx="59" cy="74" rx="6" ry="4" fill="#a0722a" transform="rotate(20 59 74)"/>
  <!-- tiny feet -->
  <ellipse cx="32" cy="88" rx="7" ry="4.5" fill="#8b5e2a"/>
  <ellipse cx="48" cy="88" rx="7" ry="4.5" fill="#8b5e2a"/>
</svg>
