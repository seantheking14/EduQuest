<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Grass Egg">
  <defs>
    <radialGradient id="gegg" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#58d68d"/>
      <stop offset="60%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#145a32"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="92" rx="22" ry="5" fill="#145a32" opacity="0.28"/>
  <!-- egg body -->
  <ellipse cx="40" cy="57" rx="27" ry="34" fill="url(#gegg)"/>
  <!-- highlight -->
  <ellipse cx="29" cy="43" rx="8" ry="12" fill="white" opacity="0.12" transform="rotate(-18 29 43)"/>
  <!-- leaf vein pattern (center rib + lateral veins) -->
  <line x1="40" y1="30" x2="40" y2="82" stroke="#145a32" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="28" y2="54" stroke="#145a32" stroke-width="1"   opacity="0.35" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="52" y2="54" stroke="#145a32" stroke-width="1"   opacity="0.35" stroke-linecap="round"/>
  <line x1="40" y1="55" x2="24" y2="63" stroke="#145a32" stroke-width="1"   opacity="0.3"  stroke-linecap="round"/>
  <line x1="40" y1="55" x2="56" y2="63" stroke="#145a32" stroke-width="1"   opacity="0.3"  stroke-linecap="round"/>
  <line x1="40" y1="66" x2="28" y2="73" stroke="#145a32" stroke-width="0.9" opacity="0.28" stroke-linecap="round"/>
  <line x1="40" y1="66" x2="52" y2="73" stroke="#145a32" stroke-width="0.9" opacity="0.28" stroke-linecap="round"/>
  <!-- leaf on top -->
  <path d="M35,26 Q28,14 33,8 Q38,4 40,12 Q42,4 47,8 Q52,14 45,26 Q42,20 40,18 Q38,20 35,26Z" fill="#4ade80"/>
  <line x1="40" y1="26" x2="40" y2="12" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
