<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shellby the Water Young Turtle">
  <defs>
    <radialGradient id="wyshell" cx="44%" cy="33%" r="64%">
      <stop offset="0%" stop-color="#45d4c8"/>
      <stop offset="100%" stop-color="#0e8070"/>
    </radialGradient>
    <radialGradient id="wyskin" cx="44%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#1a6fa3"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="93" rx="26" ry="5.5" fill="#0e6655" opacity="0.25"/>
  <!-- shell (bigger, patterned dome) -->
  <ellipse cx="40" cy="62" rx="28" ry="23" fill="url(#wyshell)"/>
  <!-- shell pattern: center hexagon + radiating dividers -->
  <polygon points="40,44 28,57 32,73 48,73 52,57" fill="none" stroke="#0a5c4e" stroke-width="1.5" opacity="0.45"/>
  <line x1="40" y1="44" x2="40" y2="73" stroke="#0a5c4e" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="57" x2="52" y2="57" stroke="#0a5c4e" stroke-width="1" opacity="0.35"/>
  <line x1="32" y1="73" x2="52" y2="57" stroke="#0a5c4e" stroke-width="1" opacity="0.3"/>
  <line x1="48" y1="73" x2="28" y2="57" stroke="#0a5c4e" stroke-width="1" opacity="0.3"/>
  <!-- shell highlight -->
  <ellipse cx="31" cy="52" rx="9" ry="12" fill="white" opacity="0.1" transform="rotate(-15 31 52)"/>
  <!-- neck -->
  <ellipse cx="55" cy="56" rx="8" ry="7" fill="#5dade2"/>
  <!-- head (bigger, confident) -->
  <circle cx="57" cy="50" r="14" fill="url(#wyskin)"/>
  <!-- slight ridge on head top (crown-like) -->
  <path d="M49,40 Q57,36 65,40" fill="none" stroke="#1a6fa3" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="52" cy="47" r="6"   fill="white"/>
  <circle cx="52" cy="47" r="3.8" fill="#1a1a1a"/>
  <circle cx="53.4" cy="45.6" r="1.5" fill="white"/>
  <circle cx="62" cy="47" r="5"   fill="white"/>
  <circle cx="62" cy="47" r="3"   fill="#1a1a1a"/>
  <circle cx="63.2" cy="45.7" r="1.2" fill="white"/>
  <!-- confident smile -->
  <path d="M50,55 Q57,60 64,55" fill="none" stroke="#1a4a7a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- front flippers (larger) -->
  <ellipse cx="16" cy="68" rx="10" ry="6" fill="#2e86c1" transform="rotate(-25 16 68)"/>
  <ellipse cx="64" cy="70" rx="10" ry="6" fill="#2e86c1" transform="rotate(20 64 70)"/>
  <!-- back flippers -->
  <ellipse cx="26" cy="84" rx="8" ry="5" fill="#2e86c1" transform="rotate(20 26 84)"/>
  <ellipse cx="56" cy="85" rx="8" ry="5" fill="#2e86c1" transform="rotate(-15 56 85)"/>
  <!-- bubbles (2) -->
  <circle cx="68" cy="42" r="5"   fill="#bff0ea" opacity="0.7"/>
  <circle cx="74" cy="35" r="3"   fill="#bff0ea" opacity="0.6"/>
  <circle cx="68" cy="42" r="5"   fill="none" stroke="#1abc9c" stroke-width="1" opacity="0.5"/>
  <circle cx="66.5" cy="40.5" r="1.8" fill="white" opacity="0.5"/>
</svg>
