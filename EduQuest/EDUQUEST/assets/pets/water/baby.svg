<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bubbles the Water Baby Turtle">
  <defs>
    <radialGradient id="wbshell" cx="44%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#48d1cc"/>
      <stop offset="100%" stop-color="#148f77"/>
    </radialGradient>
    <radialGradient id="wbskin" cx="44%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5dade2"/>
      <stop offset="100%" stop-color="#2e86c1"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="93" rx="22" ry="5" fill="#0e6655" opacity="0.22"/>
  <!-- shell (dome on top of body) -->
  <ellipse cx="40" cy="60" rx="24" ry="20" fill="url(#wbshell)"/>
  <!-- shell pattern (simple hexagonal-hint lines) -->
  <path d="M40,42 L30,56 L40,70 L50,56 Z" fill="none" stroke="#0e6655" stroke-width="1.2" opacity="0.4"/>
  <line x1="30" y1="56" x2="50" y2="56" stroke="#0e6655" stroke-width="1" opacity="0.35"/>
  <!-- shell highlight -->
  <ellipse cx="33" cy="52" rx="7" ry="9" fill="white" opacity="0.1" transform="rotate(-15 33 52)"/>
  <!-- body/head peeking from front of shell -->
  <ellipse cx="52" cy="68" rx="12" ry="10" fill="url(#wbskin)"/>
  <!-- neck -->
  <ellipse cx="52" cy="58" rx="7" ry="5" fill="#5dade2"/>
  <!-- head -->
  <circle cx="55" cy="53" r="11" fill="url(#wbskin)"/>
  <!-- big cute eyes -->
  <circle cx="51" cy="50" r="5" fill="white"/>
  <circle cx="51" cy="50" r="3" fill="#1a1a1a"/>
  <circle cx="52.2" cy="48.8" r="1.2" fill="white"/>
  <circle cx="59" cy="50" r="4" fill="white"/>
  <circle cx="59" cy="50" r="2.5" fill="#1a1a1a"/>
  <circle cx="60" cy="48.8" r="1" fill="white"/>
  <!-- happy smile -->
  <path d="M50,57 Q55,61 60,57" fill="none" stroke="#1a4a7a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- small front flippers -->
  <ellipse cx="22" cy="70" rx="8" ry="5" fill="#2e86c1" transform="rotate(-20 22 70)"/>
  <ellipse cx="62" cy="72" rx="8" ry="5" fill="#2e86c1" transform="rotate(15 62 72)"/>
  <!-- back flippers (tiny, peeking below shell) -->
  <ellipse cx="30" cy="80" rx="6" ry="4" fill="#2e86c1" transform="rotate(15 30 80)"/>
  <ellipse cx="52" cy="81" rx="6" ry="4" fill="#2e86c1" transform="rotate(-10 52 81)"/>
  <!-- bubble above head -->
  <circle cx="63" cy="42" r="4"   fill="#bff0ea" opacity="0.7"/>
  <circle cx="68" cy="36" r="2.5" fill="#bff0ea" opacity="0.55"/>
  <circle cx="63" cy="42" r="4"   fill="none" stroke="#1abc9c" stroke-width="0.8" opacity="0.5"/>
  <!-- highlight on bubble -->
  <circle cx="61.5" cy="40.5" r="1.3" fill="white" opacity="0.5"/>
</svg>
