<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Water Egg">
  <defs>
    <radialGradient id="wegg" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#48d1cc"/>
      <stop offset="60%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#0e6655"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="92" rx="22" ry="5" fill="#0e6655" opacity="0.28"/>
  <!-- egg body -->
  <ellipse cx="40" cy="57" rx="27" ry="34" fill="url(#wegg)"/>
  <!-- highlight -->
  <ellipse cx="29" cy="43" rx="8" ry="12" fill="white" opacity="0.14" transform="rotate(-18 29 43)"/>
  <!-- wave ripple lines (horizontal, slightly curved) -->
  <path d="M18,46 Q28,43 40,46 Q52,49 62,46" fill="none" stroke="#0e6655" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
  <path d="M16,56 Q27,53 40,56 Q53,59 64,56" fill="none" stroke="#0e6655" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M18,66 Q28,63 40,66 Q52,69 62,66" fill="none" stroke="#0e6655" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <!-- small sparkle bubbles on shell -->
  <circle cx="30" cy="50" r="2.5" fill="#bff0ea" opacity="0.55"/>
  <circle cx="50" cy="48" r="2"   fill="#bff0ea" opacity="0.5"/>
  <circle cx="36" cy="64" r="1.8" fill="#bff0ea" opacity="0.45"/>
  <!-- bubble on top -->
  <circle cx="40" cy="21" r="7" fill="#7ecac4" opacity="0.8"/>
  <circle cx="40" cy="21" r="7" fill="none" stroke="#1abc9c" stroke-width="1.2" opacity="0.6"/>
  <!-- bubble highlight -->
  <circle cx="37.5" cy="18.5" r="2.5" fill="white" opacity="0.45"/>
  <!-- thin bubble line up from egg -->
  <line x1="40" y1="28" x2="40" y2="23" stroke="#1abc9c" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
