<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Iggy the Fire Baby Echidna">
  <defs>
    <radialGradient id="fibody" cx="44%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#f0892b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="fihead" cx="44%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="42" cy="93" rx="22" ry="5" fill="#922b21" opacity="0.22"/>
  <!-- body (round barrel) -->
  <ellipse cx="38" cy="72" rx="24" ry="18" fill="url(#fibody)"/>
  <!-- belly patch -->
  <ellipse cx="44" cy="75" rx="13" ry="10" fill="#f0b27a" opacity="0.55"/>
  <!-- spines on back (3 quills pointing up-left) -->
  <line x1="26" y1="66" x2="18" y2="50" stroke="#922b21" stroke-width="4" stroke-linecap="round"/>
  <line x1="34" y1="61" x2="28" y2="45" stroke="#7b241c" stroke-width="4" stroke-linecap="round"/>
  <line x1="42" y1="59" x2="38" y2="43" stroke="#922b21" stroke-width="4" stroke-linecap="round"/>
  <!-- flame tips on spines -->
  <path d="M18,50 Q15,43 18,37 Q21,43 24,50Z" fill="#f39c12"/>
  <path d="M28,45 Q25,38 28,32 Q31,38 34,45Z" fill="#f97316"/>
  <path d="M38,43 Q36,36 38,30 Q40,36 42,43Z" fill="#fbbf24"/>
  <!-- head (round, right of body) -->
  <circle cx="54" cy="64" r="14" fill="url(#fihead)"/>
  <!-- long echidna snout -->
  <path d="M61,63 Q74,64 72,67 Q61,69 57,65Z" fill="#cd6200"/>
  <!-- nostril -->
  <circle cx="71" cy="66" r="1.3" fill="#7b241c"/>
  <!-- big cute eye -->
  <circle cx="53" cy="59" r="5.5" fill="white"/>
  <circle cx="53" cy="59" r="3.5" fill="#1a1a1a"/>
  <circle cx="54.5" cy="57.5" r="1.3" fill="white"/>
  <!-- small ear spine -->
  <line x1="49" y1="52" x2="46" y2="43" stroke="#922b21" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M46,43 Q44,37 46,32 Q48,37 50,43Z" fill="#f39c12"/>
  <!-- short legs -->
  <ellipse cx="28" cy="86" rx="7" ry="4.5" fill="#cd6200"/>
  <ellipse cx="48" cy="87" rx="7" ry="4.5" fill="#cd6200"/>
  <!-- tiny claws -->
  <line x1="24" y1="89" x2="22" y2="91" stroke="#7b241c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="90" x2="27" y2="92" stroke="#7b241c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="90" x2="43" y2="92" stroke="#7b241c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="48" y1="91" x2="47" y2="93" stroke="#7b241c" stroke-width="1.2" stroke-linecap="round"/>
</svg>
