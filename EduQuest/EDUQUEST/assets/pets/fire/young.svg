<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Blazeback the Fire Young Echidna">
  <defs>
    <radialGradient id="fybody" cx="44%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#e87422"/>
      <stop offset="100%" stop-color="#b03a2e"/>
    </radialGradient>
    <radialGradient id="fyhead" cx="44%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0912a"/>
      <stop offset="100%" stop-color="#d35400"/>
    </radialGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="40" cy="93" rx="26" ry="5.5" fill="#7b241c" opacity="0.25"/>
  <!-- body (bigger, rounder) -->
  <ellipse cx="36" cy="72" rx="28" ry="21" fill="url(#fybody)"/>
  <!-- belly -->
  <ellipse cx="44" cy="77" rx="16" ry="12" fill="#f0b27a" opacity="0.5"/>
  <!-- 5 spines with large flame tips -->
  <line x1="20" y1="68" x2="9"  y2="48" stroke="#7b241c" stroke-width="5" stroke-linecap="round"/>
  <line x1="28" y1="62" x2="19" y2="42" stroke="#922b21" stroke-width="5" stroke-linecap="round"/>
  <line x1="36" y1="58" x2="30" y2="37" stroke="#7b241c" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="57" x2="41" y2="36" stroke="#922b21" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="52" y1="60" x2="53" y2="40" stroke="#7b241c" stroke-width="4" stroke-linecap="round"/>
  <!-- flame tips (larger) -->
  <path d="M9,48 Q5,38 9,28 Q13,38 17,48Z" fill="#f39c12"/>
  <path d="M19,42 Q15,32 19,22 Q23,32 27,42Z" fill="#ef4444"/>
  <path d="M30,37 Q26,25 30,15 Q34,25 38,37Z" fill="#fbbf24"/>
  <path d="M41,36 Q38,24 41,14 Q44,24 47,36Z" fill="#f97316"/>
  <path d="M53,40 Q56,29 53,19 Q50,29 47,40Z" fill="#f39c12"/>
  <!-- head (bigger, fiercer) -->
  <circle cx="57" cy="63" r="16" fill="url(#fyhead)"/>
  <!-- snout (longer) -->
  <path d="M66,61 Q80,62 78,66 Q66,68 62,64Z" fill="#b5451b"/>
  <!-- nostrils -->
  <circle cx="76" cy="65" r="1.5" fill="#7b241c"/>
  <circle cx="73" cy="63" r="1" fill="#7b241c" opacity="0.6"/>
  <!-- fierce eyes -->
  <circle cx="56" cy="57" r="6" fill="white"/>
  <circle cx="56" cy="57" r="4" fill="#1a1a1a"/>
  <circle cx="57.5" cy="55.5" r="1.4" fill="white"/>
  <!-- brow line (fierce) -->
  <path d="M50,51 Q57,47 64,51" fill="none" stroke="#7b241c" stroke-width="2.2" stroke-linecap="round"/>
  <!-- 2 head spines -->
  <line x1="50" y1="49" x2="46" y2="38" stroke="#7b241c" stroke-width="3" stroke-linecap="round"/>
  <path d="M46,38 Q44,30 46,23 Q48,30 50,38Z" fill="#f39c12"/>
  <line x1="63" y1="49" x2="68" y2="38" stroke="#922b21" stroke-width="3" stroke-linecap="round"/>
  <path d="M68,38 Q70,30 68,23 Q66,30 64,38Z" fill="#f39c12"/>
  <!-- tail (small, spiky) -->
  <path d="M10,78 Q2,73 4,81 Q6,88 14,83Z" fill="#b03a2e"/>
  <!-- legs -->
  <ellipse cx="26" cy="88" rx="8.5" ry="5.5" fill="#b5451b"/>
  <ellipse cx="50" cy="90" rx="8.5" ry="5.5" fill="#b5451b"/>
  <!-- claws -->
  <line x1="21" y1="92" x2="19" y2="94" stroke="#7b241c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="93" x2="25" y2="95" stroke="#7b241c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="94" x2="44" y2="96" stroke="#7b241c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51" y1="95" x2="50" y2="97" stroke="#7b241c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
