<svg viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thornflare the Fire Adult Echidna">
  <defs>
    <radialGradient id="fadbody" cx="44%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#e07020"/>
      <stop offset="55%" stop-color="#b03a2e"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </radialGradient>
    <radialGradient id="fadhead" cx="44%" cy="33%" r="62%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#d35400"/>
    </radialGradient>
    <radialGradient id="fadbelly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5cba7"/>
      <stop offset="100%" stop-color="#e59866"/>
    </radialGradient>
  </defs>
  <!-- ambient glow under body -->
  <ellipse cx="44" cy="104" rx="32" ry="7" fill="#c0392b" opacity="0.3"/>
  <!-- large body -->
  <ellipse cx="40" cy="78" rx="33" ry="25" fill="url(#fadbody)"/>
  <!-- belly -->
  <ellipse cx="50" cy="83" rx="19" ry="14" fill="url(#fadbelly)" opacity="0.55"/>
  <!-- 7 thick spines with large flame tips -->
  <line x1="16" y1="74" x2="2"  y2="50" stroke="#6b1e1e" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="24" y1="67" x2="12" y2="42" stroke="#7b241c" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="32" y1="62" x2="23" y2="36" stroke="#6b1e1e" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="40" y1="59" x2="36" y2="32" stroke="#7b241c" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="50" y1="59" x2="50" y2="32" stroke="#6b1e1e" stroke-width="5" stroke-linecap="round"/>
  <line x1="58" y1="63" x2="65" y2="38" stroke="#7b241c" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="66" y1="70" x2="77" y2="50" stroke="#6b1e1e" stroke-width="4" stroke-linecap="round"/>
  <!-- large flame tips -->
  <path d="M2,50  Q-3,37 2,24  Q7,37 12,50Z"  fill="#f39c12"/>
  <path d="M12,42 Q7,28  12,15 Q17,28 22,42Z" fill="#ef4444"/>
  <path d="M23,36 Q18,21 23,8  Q28,21 33,36Z" fill="#fbbf24"/>
  <path d="M36,32 Q33,17 36,4  Q39,17 42,32Z" fill="#f39c12"/>
  <path d="M50,32 Q53,17 50,4  Q47,17 44,32Z" fill="#fbbf24"/>
  <path d="M65,38 Q70,24 65,12 Q60,24 55,38Z" fill="#f97316"/>
  <path d="M77,50 Q83,38 77,28 Q71,38 67,50Z" fill="#f39c12"/>
  <!-- inner fire core glow -->
  <path d="M32,62 Q36,52 40,50 Q44,52 48,62 Q44,56 40,54 Q36,56 32,62Z" fill="#fbbf24" opacity="0.65"/>
  <!-- large head -->
  <circle cx="64" cy="71" r="20" fill="url(#fadhead)"/>
  <!-- powerful snout -->
  <path d="M76,69 Q90,70 88,74 Q76,77 71,72Z" fill="#a04000"/>
  <!-- nostrils -->
  <circle cx="86" cy="73" r="1.7" fill="#7b241c"/>
  <circle cx="83" cy="70" r="1.3" fill="#7b241c" opacity="0.7"/>
  <!-- intense eyes with glow ring -->
  <circle cx="63" cy="64" r="7" fill="white"/>
  <circle cx="63" cy="64" r="4.5" fill="#1a1a1a"/>
  <circle cx="65" cy="62" r="1.7" fill="white"/>
  <circle cx="63" cy="64" r="7" fill="none" stroke="#f39c12" stroke-width="1.8" opacity="0.7"/>
  <!-- powerful brow -->
  <path d="M55,57 Q64,52 73,57" fill="none" stroke="#7b241c" stroke-width="2.8" stroke-linecap="round"/>
  <!-- two large head spines -->
  <line x1="56" y1="52" x2="52" y2="40" stroke="#7b241c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M52,40 Q49,29 52,19 Q55,29 58,40Z" fill="#f39c12"/>
  <line x1="72" y1="52" x2="78" y2="40" stroke="#7b241c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M78,40 Q81,29 78,19 Q75,29 72,40Z" fill="#f39c12"/>
  <!-- sturdy tail -->
  <path d="M9,86 Q-2,79 0,90 Q2,100 12,93Z" fill="#922b21"/>
  <!-- thick powerful legs -->
  <ellipse cx="26" cy="98" rx="11" ry="7" fill="#b03a2e"/>
  <ellipse cx="54" cy="100" rx="11" ry="7" fill="#b03a2e"/>
  <!-- claws -->
  <line x1="19" y1="103" x2="17" y2="106" stroke="#7b241c" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="104" x2="24" y2="107" stroke="#7b241c" stroke-width="2" stroke-linecap="round"/>
  <line x1="49" y1="105" x2="47" y2="108" stroke="#7b241c" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="106" x2="54" y2="109" stroke="#7b241c" stroke-width="2" stroke-linecap="round"/>
</svg>
